name: CD - Cron Latest Tag

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  deploy: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: git fetch --tags

      - name: Get Latest Tag
        run: |
          TAG=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo "TAG=$TAG" >> $GITHUB_ENV

      - run: docker pull pythoncodelife/auth-service:${{ env.TAG }}

      - name: Deploy
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_PROJECT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"