name: Release Tags (Manual Controlled)

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: "Type YES to proceed"
        required: true
        default: "NO"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ✅ IMPORTANT FIX: fetch full history + tags
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags

      # ----------------------------------------
      # Get Latest Tag (CORRECT NOW)
      # ----------------------------------------
      - name: Get Latest Tag
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "📌 Latest tag: $LATEST_TAG"

      # ----------------------------------------
      # Show Changes
      # ----------------------------------------
      - name: Show Changes
        run: |
          echo "📜 Changes since last tag:"
          git log $LATEST_TAG..HEAD --oneline || echo "No changes"

      # ----------------------------------------
      # Increment Tag SAFELY
      # ----------------------------------------
      - name: Increment Tag
        run: |
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "💡 New tag: $NEW_TAG"

      # ----------------------------------------
      # Confirm Proceed
      # ----------------------------------------
      - name: Check Proceed
        run: |
          if [ "${{ github.event.inputs.proceed }}" != "YES" ]; then
            echo "❌ Skipped (proceed != YES)"
            exit 0
          fi

      # ----------------------------------------
      # Create Tag (SAFE CHECK)
      # ----------------------------------------
      - name: Create Tag
        run: |
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "⚠️ Tag already exists. Skipping..."
            exit 0
          fi

          git tag $NEW_TAG
          git push origin $NEW_TAG
          echo "✅ Tag created: $NEW_TAG"

      # ----------------------------------------
      # Create Release
      # ----------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: "🚀 Release ${{ env.NEW_TAG }}"
          body: |
            Changes:
            See commit history in Actions logs

      - name: Done
        run: echo "🎯 Release completed successfully 🚀"



