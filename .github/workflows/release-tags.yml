name: Release Tags Manual (Simple)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Tags
        run: git fetch --tags

      - name: Get Latest Tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST_TAG"

      - name: Show Commits
        run: |
          echo "Changes:"
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --oneline || echo "No commits"

      - name: Create Tag
        run: |
          TAG="v1.0.$RANDOM"
          echo "Using tag: $TAG"
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release"
