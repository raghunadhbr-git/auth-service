name: CI - Build & Push Docker

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Metadata
      - name: Set Metadata
        run: |
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/auth-service:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

      # Docker login
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN_COMMON }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME_COMMON }}" --password-stdin

      # Build
      - name: Build Image
        run: docker build -t $IMAGE .

      # Push SHA
      - name: Push SHA
        run: docker push $IMAGE

      # Tag latest
      - name: Tag Latest
        run: |
          docker tag $IMAGE pythoncodelife/auth-service:latest
          docker push pythoncodelife/auth-service:latest

      # Tag version (if tag)
      - name: Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker tag $IMAGE pythoncodelife/auth-service:$TAG
          docker push pythoncodelife/auth-service:$TAG

      # Email Success
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_DEV }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "✅ CI SUCCESS"
          to: ${{ secrets.MAIL_TO_DEV }}
          cc: ${{ secrets.MAIL_CC_DEV }}
          from: ${{ secrets.MAIL_USERNAME_DEV }}
          body: |
            CI SUCCESS 🚀

            Branch: ${{ env.BRANCH }}
            Commit: ${{ env.COMMIT }}

            Docker Image:
            ${{ env.IMAGE }}

            URL:
            ${{ env.URL }}

      # Email Failure
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3