name: 🧠 Pre-Deploy Validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # START
      # ==========================================
      - name: 🚀 Start Validation
        run: |
          echo ""
          echo "=================================================="
          echo "🧠 PRE-DEPLOY VALIDATION STARTED"
          echo "=================================================="
          echo ""

      # ==========================================
      # CHECKOUT
      # ==========================================
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ==========================================
      # FETCH TAGS
      # ==========================================
      - name: 🔄 Fetch Tags
        run: |
          git fetch --tags
          echo "✅ Tags fetched"

      # ==========================================
      # GET TAG + COMMIT
      # ==========================================
      - name: 🔍 Detect Latest Tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            echo "❌ NO TAG FOUND"
            exit 1
          fi

          COMMIT=$(git rev-list -n 1 $TAG)
          MESSAGE=$(git log -1 --pretty=%s $COMMIT)

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

          echo ""
          echo "================ TAG DETAILS ================"
          echo "🏷️  TAG        : $TAG"
          echo "🔗 COMMIT     : $COMMIT"
          echo "📝 MESSAGE    : $MESSAGE"
          echo "============================================"
          echo ""

      # ==========================================
      # DOCKER CHECK
      # ==========================================
      - name: 🐳 Check Docker Image
        run: |
          echo ""
          echo "=============== DOCKER CHECK ==============="

          IMAGE="pythoncodelife/auth-service:$TAG"
          echo "📦 Checking Image: $IMAGE"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          https://hub.docker.com/v2/repositories/pythoncodelife/auth-service/tags/$TAG)

          if [ "$STATUS" = "200" ]; then
            echo "✅ IMAGE FOUND"
            echo "READY=true" >> $GITHUB_ENV
          else
            echo "❌ IMAGE NOT FOUND"
            echo "READY=false" >> $GITHUB_ENV
          fi

          echo "============================================"
          echo ""

      # ==========================================
      # FINAL DECISION (LOGS)
      # ==========================================
      - name: 🧠 FINAL RESULT
        run: |
          echo ""
          echo "=================================================="
          echo "🚀 FINAL DEPLOYMENT STATUS"
          echo "=================================================="

          if [ "$READY" = "true" ]; then
            echo ""
            echo "✅ STATUS: SAFE TO DEPLOY 🚀"
            echo "👉 YOU CAN DEPLOY THIS VERSION NOW 💯"
          else
            echo ""
            echo "❌ STATUS: NOT READY"
            echo "⏳ WAIT FOR CI TO COMPLETE"
          fi

          echo ""
          echo "🏷️ TAG    : $TAG"
          echo "🔗 COMMIT : $COMMIT"
          echo "📝 MESSAGE: $MESSAGE"
          echo ""
          echo "=================================================="
          echo ""

      # ==========================================
      # EMAIL SUCCESS
      # ==========================================
      - name: 📧 Email - READY
        if: env.READY == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "🚀 READY TO DEPLOY - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            ==================================================
            🧠 PRE-DEPLOY VALIDATION SUCCESS
            ==================================================

            ✅ SAFE TO DEPLOY 🚀

            🎯 ACTION:
            You can now trigger CD deployment safely.

            ----------------------------------------------
            🏷️ TAG       : ${{ env.TAG }}
            🔗 COMMIT    : ${{ env.COMMIT }}
            📝 MESSAGE   : ${{ env.MESSAGE }}
            ----------------------------------------------

            📦 Docker Image:
            pythoncodelife/auth-service:${{ env.TAG }}

            ==================================================

      # ==========================================
      # EMAIL FAILURE
      # ==========================================
      - name: 📧 Email - NOT READY
        if: env.READY == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "⚠️ NOT READY - WAIT FOR CI"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            ==================================================
            ⚠️ PRE-DEPLOY VALIDATION FAILED
            ==================================================

            ❌ NOT SAFE TO DEPLOY

            🎯 ACTION:
            Wait for CI to complete, then retry.

            ----------------------------------------------
            🏷️ TAG       : ${{ env.TAG }}
            🔗 COMMIT    : ${{ env.COMMIT }}
            📝 MESSAGE   : ${{ env.MESSAGE }}
            ----------------------------------------------

            📦 Docker Image:
            pythoncodelife/auth-service:${{ env.TAG }}

            ==================================================
