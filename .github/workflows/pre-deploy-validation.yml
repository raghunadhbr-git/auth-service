name: 🧠 Pre-Deploy Validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # START
      # ==========================================
      - name: 🚀 Start Validation
        run: |
          echo "=========================================="
          echo "🧠 PRE-DEPLOY VALIDATION STARTED"
          echo "=========================================="

      # ==========================================
      # CHECKOUT
      # ==========================================
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ==========================================
      # FETCH TAGS
      # ==========================================
      - name: 🔄 Fetch Tags
        run: git fetch --tags

      # ==========================================
      # GET TAG + COMMIT
      # ==========================================
      - name: 🔍 Get Latest Tag + Commit Info
        run: |
          TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            echo "❌ ERROR: No tags found"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

          COMMIT=$(git rev-list -n 1 $TAG)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

          MESSAGE=$(git log -1 --pretty=%s $COMMIT)
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

          DATE=$(git log -1 --format=%cd --date=iso $COMMIT)
          echo "DATE=$DATE" >> $GITHUB_ENV

          echo "📌 TAG: $TAG"
          echo "🔗 COMMIT: $COMMIT"
          echo "📝 MESSAGE: $MESSAGE"
          echo "📅 DATE: $DATE"

      # ==========================================
      # DOCKER CHECK
      # ==========================================
      - name: 🐳 Check Docker Image Exists
        run: |
          IMAGE="pythoncodelife/auth-service:$TAG"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          https://hub.docker.com/v2/repositories/pythoncodelife/auth-service/tags/$TAG)

          if [ "$STATUS" = "200" ]; then
            echo "READY=true" >> $GITHUB_ENV
          else
            echo "READY=false" >> $GITHUB_ENV
          fi

      # ==========================================
      # FINAL DECISION LOG
      # ==========================================
      - name: 🧠 Final Decision
        run: |
          echo "=========================================="

          if [ "$READY" = "true" ]; then
            echo "✅ SAFE TO DEPLOY 🚀"
          else
            echo "❌ NOT READY ❌"
          fi

          echo "=========================================="

      # ==========================================
      # EMAIL SUCCESS
      # ==========================================
      - name: 📧 Email - Ready to Deploy
        if: env.READY == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "🚀 READY TO DEPLOY - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            🧠 PRE-DEPLOY VALIDATION SUCCESS

            ✅ SAFE TO DEPLOY 🚀

            Tag: ${{ env.TAG }}
            Commit: ${{ env.COMMIT }}
            Message: ${{ env.MESSAGE }}

            Docker Image:
            pythoncodelife/auth-service:${{ env.TAG }}

            🎯 You can now trigger CD deployment safely.

      # ==========================================
      # EMAIL FAILURE
      # ==========================================
      - name: 📧 Email - Not Ready
        if: env.READY == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "⚠️ NOT READY - WAIT FOR CI"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            ⚠️ PRE-DEPLOY VALIDATION FAILED

            ❌ NOT SAFE TO DEPLOY

            Tag: ${{ env.TAG }}
            Commit: ${{ env.COMMIT }}
            Message: ${{ env.MESSAGE }}

            Docker image not available yet.

            ⏳ Wait for CI to complete, then retry.