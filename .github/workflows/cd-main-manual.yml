name: CD - Main Manual

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ----------------------------------------
      # STEP 1: FETCH TAGS
      # ----------------------------------------
      - name: Fetch Tags
        run: git fetch --tags

      # ----------------------------------------
      # STEP 2: GET LATEST TAG
      # ----------------------------------------
      - name: Get Latest Tag
        run: |
          LATEST=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            echo "❌ No tags found"
            exit 1
          fi

          echo "TAG=$LATEST" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/auth-service:$LATEST" >> $GITHUB_ENV
          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

          echo "--------------------------------"
          echo "📌 Using Latest Tag: $LATEST"
          echo "--------------------------------"

      # ----------------------------------------
      # STEP 3: VERIFY IMAGE EXISTS (IMPORTANT FIX)
      # ----------------------------------------
      - name: Check Docker Image Exists
        run: |
          echo "🔍 Checking image: $IMAGE"

          if ! docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "❌ Image not found in Docker Hub: $IMAGE"
            echo "👉 You must push image before deploy"
            exit 1
          fi

          echo "✅ Image exists"

      # ----------------------------------------
      # STEP 4: PULL IMAGE
      # ----------------------------------------
      - name: Pull Docker Image
        run: docker pull $IMAGE

      # ----------------------------------------
      # STEP 5: DEPLOY
      # ----------------------------------------
      - name: Deploy to Railway
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"

      - run: sleep 30

      # ----------------------------------------
      # STEP 6: HEALTH CHECK
      # ----------------------------------------
      - name: Health Check
        run: |
          RESPONSE=$(curl -s $URL)
          echo "RESPONSE=$RESPONSE" >> $GITHUB_ENV

          echo "--------------------------------"
          echo "🌐 Response:"
          echo "$RESPONSE"
          echo "--------------------------------"

      # ----------------------------------------
      # STEP 7: EMAIL
      # ----------------------------------------
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "🚀 PROD DEPLOY SUCCESS - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            PROD DEPLOY SUCCESS 🚀

            Tag: ${{ env.TAG }}
            Image: ${{ env.IMAGE }}

            URL:
            ${{ env.URL }}

            Response:
            ${{ env.RESPONSE }}

      # ----------------------------------------
      # DONE
      # ----------------------------------------
      - name: Done
        run: echo "🎯 DEPLOYMENT COMPLETED 🚀"
