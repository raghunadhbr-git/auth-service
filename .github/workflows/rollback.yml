name: Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Rollback tag"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: docker pull pythoncodelife/auth-service:${{ github.event.inputs.tag }}

      - name: Deploy 
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_PROJECT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"